Listen 8080

<VirtualHost *:8080>
    ServerName athletix.xn--lm-systmes-56a.fr

    # Frontend statique
    DocumentRoot /var/www/athletix
    <Directory /var/www/athletix>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Proxy vers FastAPI pour toutes les routes /api/*
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/athletix_error.log
    CustomLog ${APACHE_LOG_DIR}/athletix_access.log combined
</VirtualHost>
