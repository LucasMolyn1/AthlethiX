# AthletiX — Virtual Host Apache2
# Écoute sur port 80 uniquement (OpenResty gère HTTPS en amont)
#
# Déploiement :
#   sudo cp apache2.conf /etc/apache2/sites-available/athletix.conf
#   sudo a2ensite athletix
#   sudo a2enmod proxy proxy_http
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName localhost

    # Frontend statique
    DocumentRoot /var/www/athletix
    <Directory /var/www/athletix>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Proxy vers FastAPI pour toutes les routes /api/*
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/athletix_error.log
    CustomLog ${APACHE_LOG_DIR}/athletix_access.log combined
</VirtualHost>
