<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AthletiX — Historique</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">AthletiX</div>
    <nav>
      <a href="index.html"><span class="icon">📊</span> Dashboard</a>
      <a href="history.html" class="active"><span class="icon">📋</span> Historique</a>
      <a href="journal.html"><span class="icon">📝</span> Journal</a>
      <a href="strength.html"><span class="icon">💪</span> Musculation</a>
      <a href="nutrition.html"><span class="icon">🥗</span> Nutrition</a>
    </nav>
  </aside>

  <main class="main-content">

    <div class="page-header">
      <h1>Historique</h1>
    </div>

    <div class="filters">
      <select id="filter-type">
        <option value="">Tous les sports</option>
        <option value="run">Course</option>
        <option value="trail">Trail</option>
        <option value="cycling">Vélo</option>
        <option value="swimming">Natation</option>
        <option value="strength">Musculation</option>
      </select>
      <input type="date" id="filter-from" placeholder="Depuis">
      <input type="date" id="filter-to" placeholder="Jusqu'à">
      <button class="btn btn-ghost" id="btn-filter">Filtrer</button>
      <button class="btn btn-ghost" id="btn-reset">Réinitialiser</button>
      <span id="count-label" style="font-size:.82rem;color:var(--text-muted);margin-left:4px"></span>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Sport</th>
              <th>Distance</th>
              <th>Durée</th>
              <th>Dénivelé</th>
              <th>FC moy.</th>
              <th>Calories</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="7" class="loading">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
        <button class="btn btn-ghost" id="btn-prev" disabled>← Précédent</button>
        <span id="page-info" style="font-size:.82rem;color:var(--text-muted)"></span>
        <button class="btn btn-ghost" id="btn-next">Suivant →</button>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/history.js"></script>
</body>
</html>
