<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AthletiX — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">Athleti<span class="logo-x">X</span></div>
    <nav>
      <a href="index.html" class="active"><span class="nav-dot"></span>Dashboard</a>
      <a href="history.html"><span class="nav-dot"></span>Historique</a>
      <a href="journal.html"><span class="nav-dot"></span>Journal</a>
      <a href="strength.html"><span class="nav-dot"></span>Musculation</a>
      <a href="nutrition.html"><span class="nav-dot"></span>Nutrition</a>
      <a href="compare.html"><span class="nav-dot"></span>Comparaison</a>
    </nav>
  </aside>

  <main class="main-content">

    <div class="page-header">
      <h1>Dashboard</h1>
      <div style="display:flex;gap:12px;align-items:center">
        <span class="sync-badge" id="sync-status">
          <span class="sync-dot never"></span>Chargement...
        </span>
        <button class="btn btn-primary" id="btn-sync">Synchroniser</button>
      </div>
    </div>

    <!-- Semaine en cours -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-title">Cette semaine</div>
      <div class="stats-grid" id="week-stats">
        <p class="loading">Chargement...</p>
      </div>
    </div>

    <div class="grid-2">
      <!-- Courbe de forme -->
      <div class="card">
        <div class="card-title">Charge d'entraînement — 30 jours</div>
        <div class="chart-container">
          <canvas id="fitness-chart"></canvas>
        </div>
      </div>

      <!-- Dernières activités -->
      <div class="card">
        <div class="card-title">Dernières activités</div>
        <ul class="activity-list" id="recent-list">
          <li class="loading">Chargement...</li>
        </ul>
      </div>
    </div>

    <!-- Widgets V2 : nutrition + musculation -->
    <div class="grid-2" style="margin-top:24px">
      <div class="card">
        <div class="card-title">Nutrition — cette semaine</div>
        <div class="stats-grid" id="widget-nutrition">
          <p class="loading">Chargement...</p>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Musculation — cette semaine</div>
        <div class="stats-grid" id="widget-strength">
          <p class="loading">Chargement...</p>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script src="js/vendor/chart.min.js"></script>
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
